            else if (view === 'stats') renderStats();
            else if (view === 'date') renderFixturesByDate();
        }

        // ================================================================
        //  SAVE / LOAD
        // ================================================================
        function saveData() {
            if (manualHelperActive) {
                localStorage.setItem(STORAGE_MANUAL_GROUP, JSON.stringify(appData.fixtures));
                localStorage.setItem(STORAGE_MANUAL_KO, JSON.stringify(appData.knockout));
            } else {
                localStorage.setItem(STORAGE_AUTO_GROUP, JSON.stringify(appData.fixtures));
                localStorage.setItem(STORAGE_AUTO_KO, JSON.stringify(appData.knockout));
            }
            localStorage.setItem(STORAGE_HELPER, JSON.stringify({ active: manualHelperActive, overrides: manualOverrides }));
            localStorage.setItem(STORAGE_MATCH_DETAILS, JSON.stringify(matchDetails));
            localStorage.setItem(STORAGE_SYNC_STATE, JSON.stringify(syncState));
            localStorage.setItem(STORAGE_TEAM_DATA, JSON.stringify(teamsData));
        }

        function loadData() {
            const old = localStorage.getItem("fifa2026_data");
            if (old) {
                try {
                    const p = JSON.parse(old);
                    if (p.fixtures && !localStorage.getItem(STORAGE_AUTO_GROUP)) {
                        localStorage.setItem(STORAGE_AUTO_GROUP, JSON.stringify(p.fixtures));
                        localStorage.setItem(STORAGE_MANUAL_GROUP, JSON.stringify(p.fixtures));
                    }
                    if (p.knockout && !localStorage.getItem(STORAGE_AUTO_KO)) {
                        localStorage.setItem(STORAGE_AUTO_KO, JSON.stringify(p.knockout));
                        localStorage.setItem(STORAGE_MANUAL_KO, JSON.stringify(p.knockout));
                    }
                } catch (e) {}
            }
            const ds = localStorage.getItem(STORAGE_MATCH_DETAILS);
            if (ds) try { matchDetails = JSON.parse(ds); } catch (e) {}
            const ss = localStorage.getItem(STORAGE_SYNC_STATE);
            if (ss) try { syncState = JSON.parse(ss); } catch (e) {}

            if (manualHelperActive) {
                const mg = localStorage.getItem(STORAGE_MANUAL_GROUP);
                const mk = localStorage.getItem(STORAGE_MANUAL_KO);
                appData.fixtures = mg ? JSON.parse(mg) : JSON.parse(JSON.stringify(defaultFixtures));
                appData.knockout = mk ? JSON.parse(mk) : JSON.parse(JSON.stringify(defaultKnockout));
                applyManualOverrides();
            } else {
                const ag = localStorage.getItem(STORAGE_AUTO_GROUP);
                const ak = localStorage.getItem(STORAGE_AUTO_KO);
                appData.fixtures = ag ? JSON.parse(ag) : JSON.parse(JSON.stringify(defaultFixtures));
                appData.knockout = ak ? JSON.parse(ak) : JSON.parse(JSON.stringify(defaultKnockout));
                updateKnockoutSlots();
            }
            applyPermanentOverrides();
            renderGroupStage();
            renderStandings();
            renderStats();
            if (document.getElementById("knockoutView").classList.contains("active")) renderKnockout();
            if (document.getElementById("dateView").classList.contains("active")) renderFixturesByDate();
        }

        function resetAllData() {
            if (!manualHelperActive) { showNotif("Reset only available in Manual Mode.", "warning"); return; }
            if (confirm("Reset MANUAL mode data? Auto mode data is not affected.")) {
                localStorage.removeItem(STORAGE_MANUAL_GROUP);
                localStorage.removeItem(STORAGE_MANUAL_KO);
                appData.fixtures = JSON.parse(JSON.stringify(defaultFixtures));
                appData.knockout = JSON.parse(JSON.stringify(defaultKnockout));
                manualOverrides = {};
                matchDetails = {};
                syncState = { finalized: {}, lastSync: null };
                saveData();
                applyPermanentOverrides();
                renderGroupStage();
                renderStandings();
                renderStats();
                if (document.getElementById("knockoutView").classList.contains("active")) { renderKnockout();
                    renderManualHelperPanel(); }
                if (document.getElementById("dateView").classList.contains("active")) renderFixturesByDate();
                showNotif("Manual mode reset complete", "success");
            }
        }

        // ================================================================
        //  BACKGROUND SYNC
        // ================================================================
        function startBackgroundSync() {
            if (bgSyncInterval) clearInterval(bgSyncInterval);
            bgSyncInterval = setInterval(() => {
                if (!navigator.onLine || manualHelperActive) return;
                fetchOnlineResults(true);
            }, 60000);
        }

        function stopBackgroundSync() {
            if (bgSyncInterval) { clearInterval(bgSyncInterval);
                bgSyncInterval = null; }
        }

        // ================================================================
        //  PULL TO REFRESH
        // ================================================================
        function initPullToRefresh() {
            const ptr = document.getElementById("ptrOverlay");
            const ball = document.getElementById("ptrBall");
            const threshold = 80;
            let startY = 0,
                pulling = false;

            document.addEventListener("touchstart", (e) => {
                if (window.scrollY <= 0) { startY = e.touches[0].clientY;
                    pulling = true; }
            }, { passive: true });
            document.addEventListener("touchmove", (e) => {
                if (!pulling || window.scrollY > 0) return;
                const dy = e.touches[0].clientY - startY;
                if (dy > 0) {
                    ptr.style.height = Math.min(dy, threshold + 30) + "px";
                    ptr.classList.add("active");
                    ball.style.transform = `rotate(${dy*4}deg)`;
                    if (dy > threshold) ball.classList.add("spin");
                }
            }, { passive: true });
            document.addEventListener("touchend", () => {
                if (!pulling) return;
                const h = parseInt(ptr.style.height || 0);
                ptr.style.height = "0px";
                ptr.classList.remove("active");
                ball.classList.remove("spin");
                pulling = false;
                if (h > threshold) fetchOnlineResults(false);
            });
            // Mouse fallback
            document.addEventListener("mousedown", (e) => {
                if (window.scrollY <= 0) { startY = e.clientY;
                    pulling = true; }
            });
            document.addEventListener("mousemove", (e) => {
                if (!pulling || window.scrollY > 0) return;
                const dy = e.clientY - startY;
                if (dy > 0) {
                    ptr.style.height = Math.min(dy, threshold + 30) + "px";
                    ptr.classList.add("active");
                    ball.style.transform = `rotate(${dy*4}deg)`;
                    if (dy > threshold) ball.classList.add("spin");
                }
            });
            document.addEventListener("mouseup", () => {
                if (!pulling) return;
                const h = parseInt(ptr.style.height || 0);
                ptr.style.height = "0px";
                ptr.classList.remove("active");
                ball.classList.remove("spin");
                pulling = false;
                if (h > threshold) fetchOnlineResults(false);
            });
        }

        // ================================================================
        //  TIMEZONE DETECTION
        // ================================================================
        function detectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    () => { document.getElementById("tzBadge").textContent = userTimeZone; },
                    () => { document.getElementById("tzBadge").textContent = userTimeZone; }, { timeout: 5000 }
                );
            } else {
                document.getElementById("tzBadge").textContent = userTimeZone;
            }
        }

       // ================================================================
//  INIT
// ================================================================
loadManualHelperState();
loadData();

// FIX: Sync UI with internal state - force reset if inconsistent
const savedHelper = localStorage.getItem(STORAGE_HELPER);
if (savedHelper) {
    try {
        const obj = JSON.parse(savedHelper);
        // If localStorage says manual but UI shows auto, clear corrupted state
        if (obj.active === true) {
            localStorage.removeItem(STORAGE_HELPER);
            manualHelperActive = false;
            manualOverrides = {};
            // Reload auto data from storage
            const ag = localStorage.getItem(STORAGE_AUTO_GROUP);
            const ak = localStorage.getItem(STORAGE_AUTO_KO);
            appData.fixtures = ag ? JSON.parse(ag) : JSON.parse(JSON.stringify(defaultFixtures));
            appData.knockout = ak ? JSON.parse(ak) : JSON.parse(JSON.stringify(defaultKnockout));
        }
    } catch (e) {}
}

// Ensure UI matches corrected state
if (manualHelperActive) {
    document.body.classList.add("manual-mode");
    document.getElementById("btnAutoMode").classList.remove("active");
    document.getElementById("btnManualMode").classList.add("active");
    document.getElementById("syncBtn").style.display = "none";
    document.getElementById("resetBtn").classList.remove("hidden");
} else {
    document.body.classList.remove("manual-mode");
    document.getElementById("btnAutoMode").classList.add("active");
    document.getElementById("btnManualMode").classList.remove("active");
    document.getElementById("syncBtn").style.display = "inline-block";
    document.getElementById("resetBtn").classList.add("hidden");
}

applyPermanentOverrides();
detectLocation();
initPullToRefresh();

// Auto-sync and render
async function initApp() {
    if (!manualHelperActive && navigator.onLine) {
        await fetchOnlineResults(true);
    }
    renderGroupStage();
    renderStandings();
    renderLiveMatches();
    updateKnockoutSlots();
    if (document.getElementById("knockoutView").classList.contains("active")) renderKnockout();
    if (document.getElementById("dateView").classList.contains("active")) renderFixturesByDate();
    if (document.getElementById("dateView").classList.contains("active")) renderFixturesByDate();
}

initApp();
if (!manualHelperActive) startBackgroundSync();
 
    </script>
</body>
