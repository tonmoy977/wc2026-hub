name: Scrape World Cup Results

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scraper.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update live results $(date -u +%Y-%m-%d_%H:%M)" && git push)
