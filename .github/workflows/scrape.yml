name: Generate live results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify scraper exists
        run: |
          if [ ! -f scrape.js ]; then
            echo "ERROR: scrape.js not found at repo root"
            echo "Contents of repo root:"
            ls -la
            exit 1
          fi

      - name: Generate results
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scrape.js

      - name: Verify live.json was created
        run: |
          if [ ! -f data/live.json ]; then
            echo "ERROR: data/live.json was not created by scrape.js"
            echo "Contents of data directory:"
            ls -la data/ 2>/dev/null || echo "data/ directory does not exist"
            exit 1
          fi
          echo "✅ data/live.json exists"
          echo "File size: $(wc -c < data/live.json) bytes"
          echo "First 500 chars:"
          head -c 500 data/live.json
          echo ""

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Force-add live.json even if gitignore blocks it
          git add -f data/live.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update live results $(date -u +%Y-%m-%d_%H:%M) UTC [skip ci]"
            git pull origin ${{ github.ref_name }} --rebase
            git push origin ${{ github.ref_name }}
            echo "✅ Pushed updated live.json"
          fi
