name: Generate live results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Generate results
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          LIVESCORE_API_KEY: ${{ secrets.LIVESCORE_API_KEY }}
          LIVESCORE_API_SECRET: ${{ secrets.LIVESCORE_API_SECRET }}
          THESPORTSDB_KEY: ${{ secrets.THESPORTSDB_KEY }}
          SPORTSOPENDATA_KEY: ${{ secrets.SPORTSOPENDATA_KEY }}
        run: node scraper.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update live results $(date -u +%Y-%m-%d_%H:%M) UTC [skip ci]"
            git pull origin ${{ github.ref_name }} --rebase
            git push origin ${{ github.ref_name }}
          fi
