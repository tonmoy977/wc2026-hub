name: Generate live results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify scraper exists
        run: |
          if [ ! -f scrape.js ]; then
            echo "ERROR: scrape.js not found at repo root"
            echo "Contents of repo root:"
            ls -la
            exit 1
          fi

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Generate results
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scrape.js

      - name: Upload artifact for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-data
          path: data/
          retention-days: 1

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update live results $(date -u +%Y-%m-%d_%H:%M) UTC [skip ci]"
            git pull origin HEAD:${{ github.ref_name || 'main' }} --rebase --ff-only || true
            git push origin HEAD:${{ github.ref_name || 'main' }} || echo "Push failed, may need manual resolution"
          fi
